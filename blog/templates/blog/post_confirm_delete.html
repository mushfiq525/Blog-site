{% extends "base.html" %}

{% block title %}Delete Post - My Blog{% endblock %}

{% block content %}
  <div class="card">
    <h1 style="margin-top: 0">Delete post</h1>
    <p>Are you sure you want to delete: <b>{{ post.title }}</b>?</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit">Confirm delete</button>
      <a href="{% url 'blog:post_detail' post.pk %}" style="margin-left: 12px">Cancel</a>
    </form>
  </div>
{% endblock %}
