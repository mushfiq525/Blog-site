<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}My Blog{% endblock %}</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
      }
      header {
        background: #111;
        color: #fff;
        padding: 12px 16px;
      }
      nav a {
        color: #fff;
        margin-right: 14px;
        text-decoration: none;
      }
      main {
        padding: 16px;
        max-width: 900px;
        margin: 0 auto;
      }
      .card {
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 12px;
      }
      textarea {
        width: 100%;
        min-height: 180px;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <a href="{% url 'blog:post_list' %}">Home</a>
        {% if request.user.is_authenticated %}
        <a href="{% url 'blog:post_create' %}">New Post</a>
        <span style="float: right">
          Signed in as <b>{{ request.user.username }}</b>
          <a href="{% url 'blog:logout' %}" style="margin-left: 10px">Log out</a>
        </span>
        {% else %}
        <span style="float: right">
          <a href="{% url 'blog:login' %}" style="margin-left: 10px">Log in</a>
          <a href="{% url 'blog:register' %}" style="margin-left: 10px">Register</a>
        </span>
        {% endif %}
      </nav>
    </header>
    <main>
      {% if messages %}
      <div>
        {% for message in messages %}
        <div class="card">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
